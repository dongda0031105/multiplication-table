name: Daily Report & Email

on:
  schedule:
    # 06:00 ET = 11:00 UTC Mon–Fri
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily reports for all accounts
        env:
          ACC_001_ALPACA_KEY:    ${{ secrets.ACC_001_ALPACA_KEY }}
          ACC_001_ALPACA_SECRET: ${{ secrets.ACC_001_ALPACA_SECRET }}
          ACC_002_ALPACA_KEY:    ${{ secrets.ACC_002_ALPACA_KEY }}
          ACC_002_ALPACA_SECRET: ${{ secrets.ACC_002_ALPACA_SECRET }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
        run: python src/report_runner.py --all-accounts

      - name: Commit report JSON and dashboard to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/
          git diff --cached --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
